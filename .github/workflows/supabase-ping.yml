name: Keep Supabase Projects Alive

on:
  schedule:
    - cron: '0 12 */3 * *'  # Every 3 days at noon UTC
  workflow_dispatch:          # Allow manual trigger from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping live Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://cisnbtctjoxorjlxicdt.supabase.co/rest/v1/players?select=id&limit=1" \
            -H "apikey: sb_publishable_yHwqoac_Eu0sUBtg_NzdEQ_G5984cy_" \
            -H "Authorization: Bearer sb_publishable_yHwqoac_Eu0sUBtg_NzdEQ_G5984cy_")
          echo "Live project HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Ping dev Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://nqogxdibmlrtmuogchet.supabase.co/rest/v1/players?select=id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xb2d4ZGlibWxydG11b2djaGV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTQxNDksImV4cCI6MjA5MzY3MDE0OX0.KZ3_qDWGOKWSq4H5sDFeWfzky1uY0A5brTE8ARQCmW4" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5xb2d4ZGlibWxydG11b2djaGV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwOTQxNDksImV4cCI6MjA5MzY3MDE0OX0.KZ3_qDWGOKWSq4H5sDFeWfzky1uY0A5brTE8ARQCmW4")
          echo "Dev project HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
